<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CodeBin - Minimalist pastebin for your code snippets">
    <title>CodeBin - Minimalist Pastebin</title>
    
    <!-- Preload critical fonts -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" as="style">
    
    <!-- Async load non-critical CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- We rely entirely on our own CSS for Prism now, or load a dark theme -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    
    <!-- Critical CSS -->
    <link rel="stylesheet" href="/styles/main.css?v=16">
    
    <!-- Load fonts after page load -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap">
</head>
<body class="app-body">
    <div id="prompt">&gt;</div>
    
    <!-- EDITOR -->
    <div class="editor-container" style="display: flex; flex-direction: column;">
        <footer class="foot-minibuf">
            <div class="foot">
                <span class="foot-title title-accent"><i class="fas fa-terminal"></i> codebin</span>
                <span class="foot-item">
                    <select id="language" class="terminal-select">
                        <option value="auto">auto-detect</option>
                        <option value="plaintext">txt</option>
                        <option value="javascript">js</option>
                        <option value="python">py</option>
                        <option value="html">html</option>
                        <option value="css">css</option>
                        <option value="cpp">cpp</option>
                        <option value="java">java</option>
                        <option value="csharp">c#</option>
                        <option value="php">php</option>
                        <option value="ruby">ruby</option>
                        <option value="go">go</option>
                        <option value="rust">rust</option>
                        <option value="swift">swift</option>
                        <option value="kotlin">kotlin</option>
                    </select>
                </span>
                <span class="foot-item">
                    <select id="expiration" class="terminal-select">
                        <option value="never">never</option>
                        <option value="burn">1 view (burn)</option>
                        <option value="10m">10m</option>
                        <option value="1h">1h</option>
                        <option value="1d">1d</option>
                        <option value="1w">1w</option>
                        <option value="1m">1m</option>
                    </select>
                </span>
                
                <span class="foot-end">
                    <span id="stats" class="foot-stats"></span>
                    <button id="clear-editor" class="link-reset foot-btn">[clear]</button>
                    <button id="create-paste" class="link-reset foot-btn title-accent">[save]</button>
                    <button id="toggle-theme" class="link-reset foot-btn">[theme]</button>
                    <button id="show-shortcuts" class="link-reset foot-btn">[keys]</button>
                </span>
            </div>
        </footer>
        <textarea id="code-editor" spellcheck="false" autofocus placeholder="Paste your code here..."></textarea>
    </div>

    <!-- VIEWER -->
    <div id="loader" style="display: none; padding: calc(20px + var(--footer-h)) 20px 20px 40px; color: var(--accent); font-family: 'Fira Code', monospace;">
        Fetching paste data<span class="blink">...</span>
    </div>
    <div id="paste-viewer" class="paste-viewer" style="display: none; flex-direction: column;">
        <footer class="foot-minibuf">
            <div id="stats-panel" class="stats-panel" style="display: none;">
                Total Views: <span id="total-views">0</span> | Created: <span id="created-at">-</span>
            </div>
            <div class="foot">
                <span class="foot-title title-accent"><i class="fas fa-terminal"></i> codebin</span>
                <span class="foot-item">lang:<span id="viewer-language">txt</span></span>
                <span class="foot-item">exp:<span id="viewer-expiry">never</span></span>
                <span class="foot-item" id="viewer-views">0</span>
                
                <span class="foot-end">
                    <button id="copy-button" class="link-reset foot-btn">[copy]</button>
                    <button id="stats-button" class="link-reset foot-btn">[stats]</button>
                    <button id="new-paste" class="link-reset foot-btn title-accent">[new]</button>
                </span>
            </div>
        </footer>
        <div class="paste-content-wrapper">
            <pre><code id="paste-content" class="language-plaintext"></code></pre>
        </div>
    </div>

    <!-- RESULT MODAL -->
    <div class="result-container" id="result">
        <div class="result-content">
            <span class="close" id="close-result">&times;</span>
            <div class="result-title">Paste created!</div>
            <div class="url-display">
                <input type="text" id="paste-url" readonly class="terminal-input">
                <button class="btn-primary link-reset foot-btn">[copy_url]</button>
                <button id="open-paste-btn" class="link-reset foot-btn">[open]</button>
            </div>
        </div>
    </div>

    <!-- KEYBOARD SHORTCUTS MODAL -->
    <div id="shortcuts-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div class="modal-title">Shortcuts</div>
            <div class="shortcuts-list">
                <div><span>[Ctrl+S]</span> save paste</div>
                <div><span>[Ctrl+D]</span> toggle theme</div>
                <div><span>[Ctrl+L]</span> clear editor</div>
                <div><span>[Ctrl+K]</span> shortcuts</div>
            </div>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <!-- Load highlight.js strictly for language auto-detection -->
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <!-- Load non-critical scripts asynchronously -->
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
    
    <!-- Load our app script last -->
    <script defer src="/scripts/app.js?v=8"></script>
</body>
</html>
